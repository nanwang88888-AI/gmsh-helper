<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GMSH Command Helper</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

    :root {
      --bg:          #0d1a12;
      --surface:     #132019;
      --border:      #1e3528;
      --accent:      #2d6a4f;
      --accent-hover:#1b4332;
      --accent-glow: rgba(45,106,79,0.20);
      --text:        #f0faf4;
      --text-muted:  #6b9e82;
      --user-bubble: #2d6a4f;
      --bot-bubble:  #132019;
      --code-bg:     #0a1510;
      --code-text:   #74c69d;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      height: 100vh;
      color: var(--text);
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    header h1 { font-size: 1.05rem; font-weight: 700; letter-spacing: -0.01em; color: var(--text); }
    header span { font-size: 0.78rem; color: var(--text-muted); }

    #new-chat-btn {
      margin-left: auto;
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 14px;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      color: var(--text-muted);
      font-family: inherit;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
      white-space: nowrap;
    }
    #new-chat-btn:hover {
      border-color: var(--accent);
      color: var(--text);
      background: var(--accent-glow);
    }

    #chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    #chat-container::-webkit-scrollbar { width: 5px; }
    #chat-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .message { display: flex; gap: 12px; max-width: 820px; }
    .message.user { align-self: flex-end; flex-direction: row-reverse; }
    .message.bot  { align-self: flex-start; }

    .avatar {
      width: 34px; height: 34px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.78rem;
      font-weight: 700;
      flex-shrink: 0;
      color: white;
    }
    .message.user .avatar { background: var(--accent); }
    .message.bot  .avatar { background: #1b4332; border: 1px solid var(--border); font-size: 1rem; }

    .bubble {
      padding: 12px 16px;
      border-radius: 16px;
      line-height: 1.65;
      font-size: 0.9rem;
      white-space: pre-wrap;
      word-break: break-word;
      max-width: 720px;
    }
    .message.user .bubble {
      background: var(--user-bubble);
      color: white;
      border-bottom-right-radius: 4px;
    }
    .message.bot .bubble {
      background: var(--bot-bubble);
      color: var(--text);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    .bubble code {
      background: var(--code-bg);
      color: var(--code-text);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.82em;
      border: 1px solid var(--border);
    }
    .message.user .bubble code {
      background: rgba(0,0,0,0.2);
      color: #b7e4c7;
      border-color: rgba(255,255,255,0.15);
    }
    .bubble pre {
      background: var(--code-bg);
      border: 1px solid var(--border);
      padding: 12px 14px;
      border-radius: 8px;
      overflow-x: auto;
      margin: 8px 0;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8em;
      line-height: 1.6;
    }
    .bubble pre code { background: none; color: var(--code-text); border: none; padding: 0; }
    .bubble strong { color: #95d5b2; font-weight: 600; }

    .typing-dot {
      display: inline-block;
      width: 7px; height: 7px;
      background: var(--text-muted);
      border-radius: 50%;
      margin: 0 2px;
      animation: blink 1.2s infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink {
      0%, 80%, 100% { opacity: 0.2; }
      40% { opacity: 1; }
    }

    #input-bar {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    #question {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 0.9rem;
      resize: none;
      outline: none;
      max-height: 140px;
      line-height: 1.5;
      font-family: inherit;
      color: var(--text);
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    #question::placeholder { color: var(--text-muted); }
    #question:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    #send-btn {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 10px 22px;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
      white-space: nowrap;
    }
    #send-btn:hover:not(:disabled) { background: var(--accent-hover); }
    #send-btn:disabled { background: #1a3326; color: #4a7a62; cursor: not-allowed; }

    .empty-state {
      margin: auto;
      text-align: center;
      color: var(--text-muted);
    }
    .empty-state h2 { font-size: 1.25rem; margin-bottom: 8px; color: var(--text); font-weight: 700; }
    .empty-state p  { font-size: 0.85rem; line-height: 1.65; }

    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 20px;
    }
    .suggestion {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 7px 14px;
      font-size: 0.8rem;
      cursor: pointer;
      color: var(--text-muted);
      font-family: inherit;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }
    .suggestion:hover {
      border-color: var(--accent);
      color: var(--text);
      background: var(--accent-glow);
    }
  </style>
</head>
<body>

<header>
  <div>
    <h1>GMSH Command Helper™</h1>
    <span>Powered by GPT-4o · GMSH User Guide (458 pages) &nbsp;·&nbsp; Developed by Nan Wang</span>
  </div>
  <button id="new-chat-btn" onclick="newChat()">+ New chat</button>
</header>

<div id="chat-container"></div>

<div id="input-bar">
  <textarea id="question" rows="1" placeholder="Ask about a GMSH command or concept…"></textarea>
  <button id="send-btn" onclick="sendMessage()">Send</button>
</div>

<script>
  let threadId = null;

  async function initThread() {
    const res = await fetch("/new_thread", { method: "POST" });
    const data = await res.json();
    threadId = data.thread_id;
  }

  function emptyStateHTML() {
    return `<div class="empty-state" id="empty-state">
      <h2>Ask anything about GMSH</h2>
      <p>Search commands, options, and examples from the official user guide.</p>
      <div class="suggestions">
        <div class="suggestion">How do I set mesh element size?</div>
        <div class="suggestion">Transfinite mesh on a surface</div>
        <div class="suggestion">How to define a periodic boundary?</div>
        <div class="suggestion">Extrude a 2D surface to 3D</div>
        <div class="suggestion">Save mesh in Abaqus format</div>
        <div class="suggestion">MeshAdapt algorithm options</div>
      </div>
    </div>`;
  }

  function bindSuggestions() {
    document.querySelectorAll(".suggestion").forEach(el => {
      el.addEventListener("click", () => useSuggestion(el));
    });
  }

  async function newChat() {
    await initThread();
    document.getElementById("chat-container").innerHTML = emptyStateHTML();
    bindSuggestions();
  }

  function useSuggestion(el) {
    document.getElementById("question").value = el.textContent.trim();
    sendMessage();
  }

  function appendMessage(role, text) {
    const container = document.getElementById("chat-container");
    const emptyState = document.getElementById("empty-state");
    if (emptyState) emptyState.remove();

    const msg = document.createElement("div");
    msg.className = `message ${role}`;
    msg.innerHTML = `
      <div class="avatar">${role === "user" ? "You" : "AI"}</div>
      <div class="bubble"></div>`;
    container.appendChild(msg);
    container.scrollTop = container.scrollHeight;
    return msg.querySelector(".bubble");
  }

  function renderMarkdown(text) {
    // Simple markdown: code blocks, inline code, bold
    return text
      .replace(/```([\s\S]*?)```/g, (_, code) => `<pre><code>${escHtml(code.trim())}</code></pre>`)
      .replace(/`([^`]+)`/g, (_, code) => `<code>${escHtml(code)}</code>`)
      .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
  }

  function escHtml(s) {
    return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }


  async function sendMessage() {
    const textarea = document.getElementById("question");
    const question = textarea.value.trim();
    if (!question) return;

    const sendBtn = document.getElementById("send-btn");
    textarea.value = "";
    textarea.style.height = "auto";
    sendBtn.disabled = true;

    appendMessage("user", question);

    // Typing indicator
    const botBubble = appendMessage("bot", "");
    botBubble.innerHTML = `<span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>`;

    const res = await fetch("/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ thread_id: threadId, question }),
    });

    let fullText = "";
    botBubble.innerHTML = "";

    const reader = res.body.getReader();
    const decoder = new TextDecoder();

    while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      const chunk = decoder.decode(value);
      for (const line of chunk.split("\n")) {
        if (!line.startsWith("data: ")) continue;
        const payload = line.slice(6);
        if (payload === "[DONE]") break;
        try {
          const data = JSON.parse(payload);
          if (data.text !== undefined) {
            fullText += data.text;
            // Strip OpenAI citation markers like 【4:1†gmsh.pdf】
            const clean = fullText.replace(/【[^】]*】/g, "");
            botBubble.innerHTML = renderMarkdown(escHtml(clean));
          }
          document.getElementById("chat-container").scrollTop = 9999;
        } catch {}
      }
    }

    sendBtn.disabled = false;
    textarea.focus();
  }

  // Auto-resize textarea
  document.getElementById("question").addEventListener("input", function () {
    this.style.height = "auto";
    this.style.height = Math.min(this.scrollHeight, 140) + "px";
  });

  // Send on Enter (Shift+Enter for newline)
  document.getElementById("question").addEventListener("keydown", function (e) {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  // Init on load
  document.getElementById("chat-container").innerHTML = emptyStateHTML();
  bindSuggestions();
  initThread();
</script>
</body>
</html>
